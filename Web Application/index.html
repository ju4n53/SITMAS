<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGestión - EMEC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet">
</head>

<body class="gradient-bg">

    <header class="navbar">
        <h1 class="logo-text">Escuela Municipal de Economía Circular</h1>

        <form id="form-login">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: juanvidela@emec.com">
            <span class="error-msg" id="error-user" style="display: none; color: #ff4d4d;">*Usuario no encontrado</span>

            <label for="contraseña">Contraseña</label>
            <input type="password" id="contraseña">
            <span class="error-msg" id="error-pass" style="display: none; color: #ff4d4d;">*Contraseña incorrecta</span>

            <button type="submit" class="btn-ingresar" id="boton_ingreso">
                Ingresar
            </button>
        </form>
    </header>

    <main class="content">
    </main>

    <footer class="footer-liston">
        <div class="logos-container">
            <img src="assets/biocba_sinfondo.png" alt="Ente BioCórdoba" class="logo-inst">
            <img src="assets/espacios_verdes_sinfondo.png" alt="Espacios Verdes" class="logo-inst">
            <img src="assets/ambiente_sinfondo.png" alt="Secretaría de Ambiente" class="logo-inst">
            <img src="assets/escudo1_sinfondo.png" alt="Municipalidad de Córdoba" class="logo-inst">
            <img src="assets/escudo2_contexto_sinfondo.png" alt="Córdoba Capital" class="logo-inst">
        </div>
    </footer>

</body>

<script>
    // Configuración del servicio de autenticación conectado a tu API C#
    const authService = {
        login: async (usuario, password) => {
            // Se realiza la petición POST a tu controlador local
            const response = await fetch('https://localhost:44325/api/Usuario/Login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Usuario: usuario,   // Coincide con la propiedad en Usuarios.cs
                    Password: password
                })
            });

            if (!response.ok) {
                throw new Error("Usuario o contraseña incorrectos");
            }

            return await response.json();
        }
    };

    const loginForm = document.getElementById('form-login');
    const inputUser = document.getElementById('usuario');
    const inputPass = document.getElementById('contraseña');
    const errorPass = document.getElementById('error-pass');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Limpiamos mensajes de error previos
        errorPass.style.display = 'none';

        const userVal = inputUser.value.trim();
        const passVal = inputPass.value;

        // Validación simple de campos vacíos antes de enviar
        if (!userVal || !passVal) {
            errorPass.textContent = "* Complete todos los campos";
            errorPass.style.display = 'block';
            return;
        }

        try {
            // Llamada al servicio real
            const data = await authService.login(userVal, passVal);

            // Almacenamos los datos de sesión devueltos por el servidor (nombre y rol)
            localStorage.setItem('usuarioSesion', JSON.stringify({
                nombre: data.nombre,
                rol: data.rol
            }));

            // Redirección a la landing de estructura tras éxito
            window.location.href = "../Pages/landingestructura.html";

        } catch (err) {
            // Si la API devuelve un error (ej: 401 Unauthorized), lo mostramos en pantalla
            errorPass.textContent = "* " + err.message;
            errorPass.style.display = 'block';
        }
    });
</script>
</html>
