<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITMAS - Panel de Control</title>
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../CSS/styleLS.css"> 
</head>
<body>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/newstyles.css">
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet">
</head>

<body class="min-vh-100 d-flex flex-column">

    <header class="main-header header-color-emec d-flex justify-content-between align-items-center">
        <div class="nombre-sistema">
            <span id="fecha-hora">SITMAS</span>
        </div>
        
        <div class="info-right">
            <span>Usuario: <span class="data" id="header-user">---</span></span>
            <span>Rol: <span class="data" id="header-role">---</span></span>
            <div class="role-icon"></div>
        </div>
    </header>

    <div class="main-layout flex-grow-1">

                <li class="dropdown" id="sidebar-empleados">
                    <a href="javascript:void(0)" class="dropbtn">GESTIÓN DE PERSONAL</a>
                    <div class="dropdown-content">
                        <a href="cargaempleados.html">Empleados</a>
                        <a href="cargacargos.html">Cargos</a>
                        <a href="cargabarrios.html">Barrios</a>
                    </div>
                </li>

                <li class="dropdown" id="sidebar-logistica">
                    <a href="javascript:void(0)" class="dropbtn">LOGÍSTICA</a>
                    <div class="dropdown-content">
                        <a href="#">Rutas</a>
                        <a href="#">Vehículos</a>
                    </div>
                </li>

                <li id="sidebar-configuracion">
                    <a href="#">CONFIGURACIÓN</a>
                </li>
            </ul>
        </aside>

        <main class="main-body-content">
            <div class="info-bar">
                <span>Panel Principal > Dashboard</span>
            </div>

            <section class="dashboard-grid">
                <button class="btn-nav" id="accion1">NUEVA CARGA</button>
                <button class="btn-nav" id="accion2">REPORTES</button>
                <button class="btn-nav" id="accion3">INVENTARIO</button>
            </section>
        </main>
    </div>

    <script>
        // 1. OBTENER DATOS DEL LOCALSTORAGE
        // Aquí vendrá el objeto { nombre: "Juan Videla", rol: "Administrador" } desde el controlador
        const sesion = JSON.parse(localStorage.getItem('usuarioSesion'));

        // 2. VERIFICACIÓN DE IDENTIDAD
        if (!sesion) {
            window.location.href = "../index.html";
        } else {
            // 3. ACTUALIZAR HEADER CON EL NOMBRE REAL
            // sesion.nombre ahora contiene "Nombre Apellido" gracias al cambio en el Controller
            document.getElementById('header-user').textContent = sesion.nombre;
            document.getElementById('header-role').textContent = sesion.rol.toUpperCase();
        }

        // 4. LÓGICA DE PERMISOS
        const configPermisos = {
            'Administrador': { 
                botonesVisibles: ['accion1', 'accion2', 'accion3'],
                sidebarVisibles: ['sidebar-empleados', 'sidebar-logistica', 'sidebar-configuracion']
            },
            'operario': {
                botonesVisibles: ['accion1'],
                sidebarVisibles: ['sidebar-logistica']
            }
        };

        function aplicarPermisos(rol) {
            const permisos = configPermisos[rol];
            if (!permisos) return;

            // Ocultar todo por defecto
            document.querySelectorAll('.btn-nav').forEach(btn => btn.style.display = 'none');
            document.querySelectorAll('.nav-list > li').forEach(item => item.style.display = 'none');

            // Mostrar lo que corresponde según el rol
            permisos.botonesVisibles.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = 'inline-block';
            });
            permisos.sidebarVisibles.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = 'block';
            });
        }

        // Aplicamos permisos basados en el rol guardado
        aplicarPermisos(sesion.rol);

        // Lógica de dropdowns del menú lateral
        document.querySelectorAll('.dropdown').forEach(item => {
            item.addEventListener('click', (e) => {
                // Evitamos que el click se propague si es necesario
                item.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
