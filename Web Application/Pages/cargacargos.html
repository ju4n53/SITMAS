<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITMAS - Gestión de Cargos</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../CSS/styleABM.css">
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../Js/cargos_logica.js"></script>
</head>

<body>

    <header class="main-header">
        <div class="nombre-sistema">
            <h2>SITMAS</h2>
        </div>
        <div class="info-right">
            <span>Usuario: <span class="data">---</span></span>
            <span>Rol: <span class="data">---</span></span>
            <div class="role-icon"></div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar-vertical">
            <ul class="nav-list">
                <li><a href="landingestructura.html">INICIO</a></li>
                <li class="dropdown">
                    <a href="javascript:void(0)" class="dropbtn">GESTIÓN DE PERSONAL</a>
                    <div class="dropdown-content">
                        <a href="cargaempleados.html">Empleados</a>
                        <a href="cargacargos.html">Cargos</a>
                        <a href="#">Usuarios</a>
                    </div>
                </li>
                <li><a href="#">CONFIGURACIÓN</a></li>
            </ul>
        </aside>

        <div class="main-body-content">
            <div class="info-bar">
                <span>Panel de Administración > Gestión de Cargos</span>
            </div>

            <main class="content-wrapper">
                <section class="card-section">
                    
                    <div class="card accordion-item active">
                        <div class="accordion-header" id="toggleForm">
                            <h2>Registrar Nuevo Cargo</h2>
                            <span class="icon-arrow">▼</span>
                        </div>
                        <div class="accordion-content">
                            <form class="grid-form" onsubmit="return false;">
                                <div class="form-group">
                                    <label>Descripción del Cargo</label>
                                    <input type="text" id="desc_cargo" required placeholder="Ej: Supervisor de Planta">
                                </div>
                                <div class="form-buttons" style="margin-top: 10px;">
                                    <button type="button" class="btn-submit" onclick="RegistrarCargo()">💾 Guardar Cargo</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card accordion-item">
                        <div class="accordion-header">
                            <h2>Cargos Registrados</h2>
                        </div>
                        <div style="padding: 10px 20px;">
                            <input type="text" id="inputBusqueda" placeholder="🔍 Filtrar cargos..."
                                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 20%;">Id</th>
                                        <th>Nombre del Cargo</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody_cargos"></tbody>
                            </table>
                        </div>
                    </div>

                </section>
            </main>
        </div>
    </div>

    <script>
        // Lógica de UI para dropdowns
        document.querySelectorAll('.dropdown').forEach(item => {
            item.addEventListener('click', () => item.classList.toggle('active'));
        });
        document.getElementById('toggleForm').addEventListener('click', function () {
            this.parentElement.classList.toggle('active');
        });
    </script>
</body>
</html>
