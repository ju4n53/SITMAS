<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGestión - EMEC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <h1 class="logo-text">SITMAS</h1>

        <form id="form-login">
            <label for="_usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: admin">
            <span class="error-msg" id="error-user">*Usuario no encontrado</span>

            <label for="_contraseña">Contraseña</label>
            <input type="password" id="contraseña">
            <span class="error-msg" id="error-pass">*Contraseña incorrecta</span>

            <button type="submit" class="btn-ingresar" id="boton_ingreso">
                Ingresar
            </button>

        </form>
    </header>

    <main class="content">
    </main>

    <footer class="footer-liston">
        <div class="logos-container">
            <img src=assets/biocba_sinfondo.png alt="Ente BioCórdoba" class="logo-inst">
            <img src=assets/espacios_verdes_sinfondo.png alt="Espacios Verdes" class="logo-inst">
            <img src=assets/ambiente_sinfondo.png alt="Secretaría de Ambiente" class="logo-inst">
            <img src=assets/escudo1_sinfondo.png alt="Municipalidad de Córdoba" class="logo-inst">
            <img src=assets/escudo2_contexto_sinfondo.png alt="Córdoba Capital" class="logo-inst">
        </div>
    </footer>

</body>

<script>

    // Simulación de una capa de servicio (API Client)
    const authService = {
        // Simulamos un delay de red y validación
        login: async (email, password) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // Validación básica (Hardcoded mock)
                    if (email === "sitmas@cervantes.edu.ar" && password === "123456") {
                        resolve({
                            token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...", // Mock JWT
                            user: { name: "Facundo", role: "admin" }
                        });
                    } else {
                        reject(new Error("Usuario o contraseña incorrectos"));
                    }
                }, 1500); // Latencia simulada
            });
        }
    };

    const esEmailValido = (email) => {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    };

    const loginForm = document.getElementById('form-login');
    const inputUser = document.getElementById('usuario');
    const inputPass = document.getElementById('contraseña');


    const errorUser = document.getElementById('error-user');
    const errorPass = document.getElementById('error-pass');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        errorUser.style.display = 'none';
        errorPass.style.display = 'none';

        const email = inputUser.value.trim().toLowerCase();
        const password = inputPass.value;

        if (!esEmailValido(email)) {
            errorUser.textContent = "Formato de email inválido.";
            errorUser.style.display = 'block';
            return; // Detenemos la ejecución aquí
        }

        try {
            // 3. Llamar al servicio
            const response = await authService.login(email, password);

            // 4. Manejo de éxito
            localStorage.setItem('authToken', response.token); // O mejor, usar cookies HttpOnly
            window.location.href = './landingestructura.html';

        } catch (err) {
            // Manejo de errores (mostramos el mensaje)
            errorPass.textContent = err.message;
            errorPass.style.display = 'block';
        }
    }
    );

</script>
